<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Astro Planner – Seestar‑Tuned</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 1400px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); padding-bottom: 20px; }
        .header { background: #21262d; padding: 15px; text-align: center; border-bottom: 1px solid #30363d; }
        .night-columns { display: flex; gap: 10px; padding: 15px; }
        .night-column { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; overflow-y: auto; max-height: 80vh; }
        .day-banner { background: #0d1117; padding: 10px 20px; font-size: 0.8rem; font-weight: bold; color: #58a6ff; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 5; text-align: center; }
        .item { display: flex; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #21262d; align-items: center; text-decoration: none; color: inherit; transition: 0.2s; }
        .item.clear-slot:hover { background: #1c2128; cursor: pointer; border-left: 4px solid #238636; }
        .rating { padding: 4px 8px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; }
        .exc { background: #238636; color: white; }
        .poor { background: #da3633; color: white; }
        .target-hint { font-size: 0.7rem; color: #8b949e; display: block; margin-top: 2px; }
        #status { padding: 30px; text-align: center; color: #8b949e; }
        .bottom-summary { border-top: 1px solid #30363d; margin: 0 15px 15px 15px; padding: 15px 10px 5px 10px; font-size: 0.8rem; }
        .bottom-summary h2 { font-size: 0.9rem; margin-bottom: 10px; color: #58a6ff; }
        .night-summary { padding: 8px 0; border-bottom: 1px solid #21262d; }
        .night-summary:last-child { border-bottom: none; }
        .night-summary-date { font-weight: bold; margin-bottom: 4px; }
        .night-summary-dark { color: #8b949e; margin-bottom: 4px; }
        .night-summary-object { margin-left: 10px; }
        .night-summary-object a { color: #58a6ff; text-decoration: none; }
        .night-summary-object a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 style="font-size: 1.2rem; margin:0;">Astro Forecast – Seestar‑Tuned</h1>
        <small style="color: #8b949e;">Auto‑Location • Full NGC (mag ≤ 12.5, size ≥ 2′) • Real Altitude Visibility</small>
    </div>

    <div id="status">Requesting device location…</div>

    <div id="night-columns" class="night-columns"></div>

    <div id="bottom-summary" class="bottom-summary" style="display:none;"></div>
</div>

<script>
// ---------- Utility formatting ----------
function formatTwilight(timeStr) {
    if (!timeStr) return "N/A";
    return timeStr.replace(/:\d{2}\s/, ' ');
}

function getMoonEmoji(date) {
    const lp = 2551443;
    const now = date.getTime() / 1000;
    const new_moon = new Date("1970-01-07T20:35:00Z").getTime() / 1000;
    const phase = ((now - new_moon) % lp) / lp;
    if (phase < 0.03 || phase > 0.97) return "🌑";
    if (phase < 0.22) return "🌒";
    if (phase < 0.28) return "🌓";
    if (phase < 0.47) return "🌔";
    if (phase < 0.53) return "🌕";
    if (phase < 0.72) return "🌖";
    if (phase < 0.78) return "🌗";
    return "🌘";
}

function smokeImpact(pm25) {
    if (pm25 < 15) return { ok: true, label: "Low Smoke" };
    if (pm25 < 35) return { ok: true, label: "Moderate Smoke" };
    if (pm25 < 55) return { ok: false, label: "Heavy Smoke" };
    return { ok: false, label: "Severe Smoke" };
}

// ---------- Astronomical math ----------
function deg2rad(d) { return d * Math.PI / 180; }
function rad2deg(r) { return r * 180 / Math.PI; }
function normalizeDeg(d) {
    d = d % 360;
    return d < 0 ? d + 360 : d;
}

// Julian Date from JS Date (UTC)
function toJulianDate(date) {
    const time = date.getTime();
    return time / 86400000 + 2440587.5;
}

// GMST in degrees
function gmst(jd) {
    const T = (jd - 2451545.0) / 36525.0;
    let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545.0)
               + 0.000387933 * T * T - (T * T * T) / 38710000.0;
    return normalizeDeg(gmst);
}

// Local Sidereal Time in degrees
function lst(gmstDeg, longitudeDeg) {
    return normalizeDeg(gmstDeg + longitudeDeg);
}

// Altitude from RA (hours), Dec (deg), lat (deg), LST (deg)
function altitude(raHours, decDeg, latDeg, lstDeg) {
    const raDeg = raHours * 15;
    const haDeg = normalizeDeg(lstDeg - raDeg); // hour angle in degrees
    const haRad = deg2rad(haDeg);
    const decRad = deg2rad(decDeg);
    const latRad = deg2rad(latDeg);

    const sinAlt = Math.sin(decRad) * Math.sin(latRad) +
                   Math.cos(decRad) * Math.cos(latRad) * Math.cos(haRad);
    const altRad = Math.asin(sinAlt);
    return { altDeg: rad2deg(altRad), haDeg };
}

// Transit preference score: smaller |HA| is better
function transitScore(haDeg) {
    const d = Math.min(Math.abs(haDeg), 360 - Math.abs(haDeg));
    return d; // lower is better
}

// Adaptive altitude threshold (local hour 0–23)
// Before midnight (20–23): 30°
// 00–02: 25°
// After 02: 20°
function altitudeThreshold(hour) {
    if (hour >= 20 || hour < 0) return 30;
    if (hour >= 0 && hour < 2) return 25;
    return 20;
}

// ---------- Seestar‑tuned catalog filters ----------
const MAG_LIMIT = 12.5;      // Seestar‑friendly brightness
const SIZE_LIMIT_ARCMIN = 2; // avoid tiny specks

function isSeestarFriendly(obj) {
    if (obj.mag != null && obj.mag > MAG_LIMIT) return false;
    if (obj.size != null && obj.size < SIZE_LIMIT_ARCMIN) return false;
    return true;
}

// crude Telescopius link builder (fallback if no explicit link)
function buildTelescopiusLink(name) {
    const encoded = encodeURIComponent(name.replace(/\s+/g, '-').toLowerCase());
    return `https://telescopius.com/deep-sky/object/${encoded}`;
}

// ---------- Location bootstrap ----------
function startWithLocation() {
    navigator.geolocation.getCurrentPosition(
        pos => loadAstro(pos.coords.latitude, pos.coords.longitude),
        () => {
            document.getElementById("status").innerHTML =
                "Location denied — using fallback: London, KY";
            loadAstro(37.13, -84.08);
        }
    );
}

async function loadAstro(lat, lon) {
    const status = document.getElementById('status');
    const nightColumns = document.getElementById('night-columns');
    const bottomSummaryDiv = document.getElementById('bottom-summary');

    const nightsSummary = [];

    try {
        const now = new Date();

        // Load weather + smoke
        const weatherUrl =
            `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
            `&hourly=cloud_cover,relative_humidity_2m&forecast_days=16&timezone=auto`;

        const smokeUrl =
            `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}` +
            `&hourly=pm2_5,pm10&timezone=auto`;

        // Load NGC catalog (Seestar‑tuned via filters)
        const catalogUrl = 'seestar_catalog.json';

        const [weatherRes, smokeRes, catalogRes] = await Promise.all([
            fetch(weatherUrl),
            fetch(smokeUrl),
            fetch(catalogUrl)
        ]);

        if (!weatherRes.ok || !smokeRes.ok || !catalogRes.ok)
            throw new Error("API or catalog access failed");

        const weather = await weatherRes.json();
        const smoke = await smokeRes.json();
        const catalogRaw = await catalogRes.json();

        // Filter catalog for Seestar‑friendly targets
        const OBJECTS = catalogRaw.filter(isSeestarFriendly);

        if (OBJECTS.length === 0)
            throw new Error("Catalog filter removed all objects (adjust MAG_LIMIT / SIZE_LIMIT)");

        status.style.display = 'none';

        for (let n = 0; n < 3; n++) {
            const col = document.createElement('div');
            col.className = 'night-column';
            nightColumns.appendChild(col);

            let night = new Date(now);
            night.setDate(night.getDate() + n);

            const nightStr = night.toISOString().split("T")[0];

            const nextDay = new Date(night);
            nextDay.setDate(nextDay.getDate() + 1);
            const nextDayStr = nextDay.toISOString().split("T")[0];

            const nightHours = [];
            for (let h = 20; h <= 23; h++)
                nightHours.push(`${nightStr}T${String(h).padStart(2,"0")}:00`);
            for (let h = 0; h <= 6; h++)
                nightHours.push(`${nextDayStr}T${String(h).padStart(2,"0")}:00`);

            const duskUrl = `https://api.sunrisesunset.io/json?lat=${lat}&lng=${lon}&date=${nightStr}&timezone=auto`;
            const dawnUrl = `https://api.sunrisesunset.io/json?lat=${lat}&lng=${lon}&date=${nextDayStr}&timezone=auto`;

            const [duskRes, dawnRes] = await Promise.all([
                fetch(duskUrl),
                fetch(dawnUrl)
            ]);

            const duskData = await duskRes.json();
            const dawnData = await dawnRes.json();

            const duskRaw = duskData?.results?.last_light || null;
            const dawnRaw = dawnData?.results?.first_light || null;

            const dusk = formatTwilight(duskRaw);
            const dawn = formatTwilight(dawnRaw);

            const merged = weather.hourly.time.map((t, i) => ({
                time: t,
                clouds: weather.hourly.cloud_cover[i],
                hum: weather.hourly.relative_humidity_2m[i],
                pm25: smoke.hourly.pm2_5[i]
            })).filter(entry => nightHours.includes(entry.time));

            const moonEmoji = getMoonEmoji(night);
            const bannerDate = night.toLocaleDateString([], {
                weekday: 'long', month: 'short', day: 'numeric'
            });

            const banner = document.createElement('div');
            banner.className = 'day-banner';
            banner.innerHTML = `<span>${moonEmoji} ${bannerDate}</span>`;
            col.appendChild(banner);

            // Track per-night max altitude for each object
            const perObjectMax = new Map();
            OBJECTS.forEach(obj => {
                perObjectMax.set(obj.name, {
                    maxAlt: -90,
                    maxTime: null
                });
            });

            // Hour-by-hour rows
            merged.forEach(entry => {
                const dateLocal = new Date(entry.time); // local tz from API
                const hourLocal = dateLocal.getHours();

                const jd = toJulianDate(new Date(dateLocal.toISOString()));
                const gmstDeg = gmst(jd);
                const lstDeg = lst(gmstDeg, lon);

                const smokeInfo = smokeImpact(entry.pm25);
                const isClearSky =
                    entry.clouds < 25 &&
                    entry.hum < 90 &&
                    smokeInfo.ok;

                const threshold = altitudeThreshold(hourLocal);

                const visibleObjects = [];

                OBJECTS.forEach(obj => {
                    const { altDeg, haDeg } = altitude(obj.ra, obj.dec, lat, lstDeg);

                    // Track max altitude for nightly summary (altitude-based, independent of weather)
                    const rec = perObjectMax.get(obj.name);
                    if (altDeg > rec.maxAlt) {
                        rec.maxAlt = altDeg;
                        rec.maxTime = new Date(dateLocal);
                    }

                    if (altDeg >= threshold) {
                        visibleObjects.push({
                            name: obj.name,
                            altDeg,
                            haDeg,
                            mag: obj.mag,
                            type: obj.type
                        });
                    }
                });

                let bestObject = null;

                if (visibleObjects.length === 1) {
                    bestObject = visibleObjects[0];
                } else if (visibleObjects.length > 1) {
                    // sort by altitude desc
                    visibleObjects.sort((a, b) => b.altDeg - a.altDeg);
                    const top = visibleObjects[0];
                    const second = visibleObjects[1];

                    if (Math.abs(top.altDeg - second.altDeg) <= 20) {
                        const topScore = transitScore(top.haDeg);
                        const secondScore = transitScore(second.haDeg);
                        bestObject = topScore <= secondScore ? top : second;
                    } else {
                        bestObject = top;
                    }
                }

                const isClear = isClearSky && !!bestObject;

                const row = document.createElement(isClear ? 'a' : 'div');
                row.className = `item ${isClear ? 'clear-slot' : ''}`;

                if (isClear && bestObject) {
                    row.href = buildTelescopiusLink(bestObject.name);
                    row.target = "_blank";
                }

                row.innerHTML = `
                    <div>
                        <div style="font-weight:bold;">
                            ${dateLocal.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false })}
                        </div>
                        <div style="font-size:0.8rem; color:#8b949e;">
                            Cloud: ${entry.clouds}% | Hum: ${entry.hum}% | Smoke: ${smokeInfo.label}
                        </div>
                        ${isClear && bestObject ? `<span class="target-hint">Best: ${bestObject.name}</span>` : ""}
                    </div>
                    <span class="rating ${isClear ? 'exc' : 'poor'}">
                        ${isClear ? "CLEAR" : "POOR"}
                    </span>
                `;

                col.appendChild(row);
            });

            // Build nightly summary record
            const nightSummary = {
                dateLabel: bannerDate,
                dusk,
                dawn,
                objects: []
            };

            perObjectMax.forEach((rec, name) => {
                if (rec.maxAlt > 0 && rec.maxTime) {
                    nightSummary.objects.push({
                        name,
                        maxAlt: rec.maxAlt,
                        maxTime: rec.maxTime
                    });
                }
            });

            // Sort nightly objects by max altitude descending
            nightSummary.objects.sort((a, b) => b.maxAlt - a.maxAlt);

            nightsSummary.push(nightSummary);
        }

        // Bottom summary (grouped by night)
        bottomSummaryDiv.style.display = "block";
        let html = `<h2>Dark Window & Best Altitude by Night (Seestar‑Tuned)</h2>`;

        nightsSummary.forEach(night => {
            html += `
                <div class="night-summary">
                    <div class="night-summary-date">${night.dateLabel}</div>
                    <div class="night-summary-dark">Dark Window: ${night.dusk} → ${night.dawn}</div>
            `;

            if (night.objects.length === 0) {
                html += `<div class="night-summary-object" style="color:#8b949e;">No objects significantly above horizon this night</div>`;
            } else {
                night.objects.slice(0, 10).forEach(obj => {
                    const timeStr = obj.maxTime.toLocaleTimeString([], {
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false
                    });
                    const altRounded = Math.round(obj.maxAlt);
                    const link = buildTelescopiusLink(obj.name);
                    html += `
                        <div class="night-summary-object">
                            <a href="${link}" target="_blank">${obj.name}</a>
                            — Max Alt: ${altRounded}° at ${timeStr}
                        </div>
                    `;
                });
            }

            html += `</div>`;
        });

        bottomSummaryDiv.innerHTML = html;

    } catch (err) {
        status.style.display = 'block';
        status.innerHTML = `Error: ${err.message}`;
    }
}

startWithLocation();
</script>

</body>
</html>
